<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialHub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f6fb;
}

.navbar{
background:#fff;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:24px;
font-weight:bold;
color:#4f46e5;
}

.container{
max-width:900px;
margin:20px auto;
padding:10px;
}

.profile-card{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.profile-info{
display:flex;
align-items:center;
gap:15px;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:#4f46e5;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:bold;
}

.stats{
display:flex;
gap:20px;
margin-top:8px;
}

.follow-btn{
background:#4f46e5;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

.create-post{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
margin-bottom:20px;
}

textarea{
width:100%;
height:100px;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
resize:none;
}

.post-btn{
margin-top:10px;
background:#4f46e5;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

.post{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
margin-bottom:20px;
}

.post-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.small-avatar{
width:40px;
height:40px;
border-radius:50%;
background:#4f46e5;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

.post-actions{
display:flex;
gap:20px;
margin-top:15px;
font-size:18px;
}

.action-btn{
cursor:pointer;
}

.comment-box{
margin-top:10px;
display:flex;
gap:10px;
}

.comment-box input{
flex:1;
padding:8px;
border:1px solid #ddd;
border-radius:8px;
}

.comment-box button{
padding:8px 15px;
border:none;
background:#4f46e5;
color:white;
border-radius:8px;
cursor:pointer;
}

.comment{
background:#f5f7ff;
padding:8px;
border-radius:8px;
margin-top:8px;
}

@media(max-width:768px){
.profile-card{
flex-direction:column;
gap:15px;
}
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">SocialHub</div>
<div>🏠 Feed</div>
</div>

<div class="container">

<div class="profile-card">

<div class="profile-info">

<div class="avatar">R</div>

<div>
<h2>Ramya</h2>
<p>Frontend Developer</p>

<div class="stats">
<span><b id="postsCount">0</b> Posts</span>
<span><b id="followers">120</b> Followers</span>
<span><b>80</b> Following</span>
</div>

</div>

</div>

<button class="follow-btn" onclick="toggleFollow()" id="followBtn">
Follow
</button>

</div>

<div class="create-post">

<h3>Create Post</h3>
<br>

<textarea id="postText" placeholder="What's on your mind?"></textarea>

<button class="post-btn" onclick="createPost()">
Post
</button>

</div>

<div id="posts"></div>

</div>

<script>

let followed = false;

function toggleFollow(){

const btn =
document.getElementById("followBtn");

const followers =
document.getElementById("followers");

let count =
parseInt(followers.innerText);

if(!followed){
count++;
btn.innerText="Following";
btn.style.background="#16a34a";
followed=true;
}else{
count--;
btn.innerText="Follow";
btn.style.background="#4f46e5";
followed=false;
}

followers.innerText=count;
}

function createPost(){

const text =
document.getElementById("postText").value;

if(text.trim()===""){
alert("Enter a post");
return;
}

const posts =
document.getElementById("posts");

const post =
document.createElement("div");

post.className="post";

post.innerHTML=`

<div class="post-header">
<div class="small-avatar">R</div>
<div>
<b>Ramya</b>
</div>
</div>

<p>${text}</p>

<div class="post-actions">
<span class="action-btn" onclick="likePost(this)">
❤️ <span>0</span>
</span>

<span>
💬 Comments
</span>
</div>

<div class="comment-box">
<input type="text" placeholder="Write comment...">
<button onclick="addComment(this)">
Add
</button>
</div>

<div class="comments"></div>
`;

posts.prepend(post);

document.getElementById("postText").value="";

document.getElementById("postsCount").innerText =
document.querySelectorAll(".post").length;
}

function likePost(el){

let count =
el.querySelector("span");

count.innerText =
parseInt(count.innerText)+1;
}

function addComment(btn){

const box =
btn.previousElementSibling;

const text =
box.value;

if(text.trim()==="") return;

const comments =
btn.parentElement.nextElementSibling;

const comment =
document.createElement("div");

comment.className="comment";

comment.innerHTML=
"<b>Ramya:</b> " + text;

comments.appendChild(comment);

box.value="";
}

createPost = createPost;

</script>

</body>
</html>
